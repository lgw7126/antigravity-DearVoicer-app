<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마음의 목소리 - DearVoicer</title>
    <!-- Google Fonts 로드 (Outfit 및 Noto Sans KR) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- 테마 변수 (HSL 기반 프리미엄 컬러 세트) --- */
        :root {
            /* Light Theme */
            --bg-app: hsl(38, 30%, 96%);
            --bg-card: hsl(0, 0%, 100%);
            --bg-input: hsl(38, 20%, 98%);
            --border-color: hsl(38, 15%, 88%);
            
            --text-main: hsl(38, 15%, 20%);
            --text-muted: hsl(38, 10%, 48%);
            --text-white: hsl(0, 0%, 100%);

            --primary: hsl(25, 80%, 50%);
            --primary-hover: hsl(25, 80%, 45%);
            --primary-light: hsl(25, 80%, 95%);
            
            --secondary: hsl(38, 20%, 86%);
            --secondary-hover: hsl(38, 20%, 80%);
            --secondary-text: hsl(38, 15%, 25%);

            --danger: hsl(355, 75%, 50%);
            --danger-hover: hsl(355, 75%, 45%);

            --quick-btn-bg: hsl(38, 20%, 92%);
            --quick-btn-hover: hsl(38, 20%, 86%);
            --quick-btn-text: hsl(38, 15%, 30%);

            --shadow-sm: 0 2px 8px rgba(74, 64, 50, 0.04);
            --shadow-md: 0 8px 24px rgba(74, 64, 50, 0.06);
            --shadow-lg: 0 16px 40px rgba(74, 64, 50, 0.1);
            
            --border-radius-lg: 24px;
            --border-radius-md: 16px;
            --border-radius-sm: 12px;
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.dark {
            /* Dark Theme */
            --bg-app: hsl(210, 20%, 10%);
            --bg-card: hsl(210, 16%, 16%);
            --bg-input: hsl(210, 16%, 12%);
            --border-color: hsl(210, 15%, 22%);
            
            --text-main: hsl(210, 10%, 90%);
            --text-muted: hsl(210, 8%, 62%);
            
            --primary: hsl(25, 85%, 55%);
            --primary-hover: hsl(25, 85%, 50%);
            --primary-light: hsl(25, 85%, 15%);

            --secondary: hsl(210, 15%, 24%);
            --secondary-hover: hsl(210, 15%, 30%);
            --secondary-text: hsl(210, 10%, 85%);

            --danger: hsl(355, 80%, 55%);
            --danger-hover: hsl(355, 80%, 50%);

            --quick-btn-bg: hsl(210, 15%, 22%);
            --quick-btn-hover: hsl(210, 15%, 28%);
            --quick-btn-text: hsl(210, 10%, 80%);

            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.2);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 16px 40px rgba(0, 0, 0, 0.4);
        }

        /* --- 기본 리셋 및 레이아웃 --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', 'Noto Sans KR', sans-serif;
            background-color: var(--bg-app);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: var(--transition-smooth);
        }

        /* --- 메인 컨테이너 --- */
        .app-container {
            width: 100%;
            max-width: 480px;
            background-color: var(--bg-card);
            border-radius: var(--border-radius-lg);
            padding: 28px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        /* --- 헤더 스타일 --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 16px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand-logo {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary), hsl(10, 80%, 55%));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 4px 12px rgba(211, 84, 0, 0.3);
        }

        .brand h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .brand span {
            color: var(--primary);
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            background: none;
            border: 1px solid var(--border-color);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-main);
            transition: var(--transition-smooth);
        }

        .icon-btn:hover {
            background-color: var(--quick-btn-hover);
            transform: scale(1.05);
        }

        .icon-btn:active {
            transform: scale(0.95);
        }

        .icon-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* --- 입력 섹션 --- */
        .input-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .textarea-wrapper {
            position: relative;
            width: 100%;
        }

        textarea {
            width: 100%;
            height: 160px;
            padding: 20px 20px 30px 20px;
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-md);
            background-color: var(--bg-input);
            color: var(--text-main);
            font-size: 16px;
            line-height: 1.6;
            resize: none;
            outline: none;
            transition: var(--transition-smooth);
            font-family: inherit;
        }

        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-light);
        }

        /* 스마트 추천 말풍선 오버레이 */
        .recommend-overlay {
            position: absolute;
            bottom: -5px;
            left: 12px;
            z-index: 10;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 6px 10px;
            border-radius: var(--border-radius-sm);
            box-shadow: var(--shadow-md);
            opacity: 0;
            transform: translateY(-5px);
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease, bottom 0.2s ease;
        }

        .recommend-overlay.active {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
            bottom: -42px;
        }

        .recommend-chip {
            background-color: var(--primary-light);
            border: 1px solid var(--border-color);
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition-smooth);
            white-space: nowrap;
        }

        .recommend-chip:hover {
            background-color: var(--primary);
            color: var(--text-white);
            transform: scale(1.03);
        }

        /* 글자수 카운터 */
        .char-counter {
            position: absolute;
            bottom: 12px;
            right: 16px;
            font-size: 12px;
            color: var(--text-muted);
        }

        /* --- 감정 프리셋 칩 그룹 --- */
        .emotion-section {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 4px;
        }

        .emotion-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-muted);
        }

        .emotion-chips {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .emotion-chip {
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition-smooth);
            user-select: none;
        }

        .emotion-chip:hover {
            background-color: var(--quick-btn-hover);
            color: var(--text-main);
        }

        .emotion-chip.active {
            background-color: var(--primary);
            border-color: var(--primary);
            color: var(--text-white);
            box-shadow: 0 4px 10px rgba(211, 84, 0, 0.15);
        }

        .emotion-chip:active {
            transform: scale(0.95);
        }

        /* 메인 액션 버튼 그룹 */
        .action-group {
            display: flex;
            gap: 12px;
            margin-top: 4px;
        }

        .btn {
            padding: 16px;
            border: none;
            border-radius: var(--border-radius-sm);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: var(--transition-smooth);
            user-select: none;
        }

        .btn-clear {
            background-color: var(--secondary);
            color: var(--secondary-text);
            flex: 0.4;
        }

        .btn-clear:hover {
            background-color: var(--secondary-hover);
        }

        .btn-speak {
            background-color: var(--primary);
            color: var(--text-white);
            flex: 1.6;
            box-shadow: 0 6px 16px rgba(211, 84, 0, 0.15);
        }

        .btn-speak:hover:not(:disabled) {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-speak:disabled {
            background-color: var(--secondary);
            color: var(--text-muted);
            cursor: not-allowed;
            box-shadow: none;
        }

        /* 정지 버튼 상태 */
        .btn-speak.playing {
            background-color: var(--danger);
            color: var(--text-white);
            box-shadow: 0 6px 16px rgba(231, 76, 60, 0.25);
        }

        .btn-speak.playing:hover {
            background-color: var(--danger-hover);
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* --- 속도 조절 영역 --- */
        .speed-section {
            background-color: var(--bg-input);
            border-radius: var(--border-radius-md);
            padding: 16px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .speed-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .speed-value-badge {
            background-color: var(--primary-light);
            color: var(--primary);
            padding: 2px 8px;
            border-radius: 20px;
            font-family: 'Outfit', sans-serif;
            font-size: 13px;
        }

        .slider-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .speed-adjust-btn {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-main);
            font-size: 16px;
            font-weight: bold;
            transition: var(--transition-smooth);
        }

        .speed-adjust-btn:hover {
            background-color: var(--quick-btn-hover);
        }

        input[type="range"] {
            flex: 1;
            height: 6px;
            border-radius: 3px;
            background: var(--border-color);
            outline: none;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .speed-presets {
            display: flex;
            gap: 8px;
        }

        .preset-btn {
            flex: 1;
            padding: 8px;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-sm);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            color: var(--text-muted);
            transition: var(--transition-smooth);
        }

        .preset-btn:hover {
            background-color: var(--quick-btn-hover);
            color: var(--text-main);
        }

        .preset-btn.active {
            background-color: var(--primary);
            border-color: var(--primary);
            color: var(--text-white);
        }

        /* --- 자주 하는 말 그리드 영역 --- */
        .quick-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .quick-section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .quick-section-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .add-phrase-btn {
            background: none;
            border: none;
            color: var(--primary);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: var(--transition-smooth);
        }

        .add-phrase-btn:hover {
            color: var(--primary-hover);
            transform: translateX(2px);
        }

        .quick-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            max-height: 220px;
            overflow-y: auto;
            padding-right: 4px;
        }

        /* 스크롤바 디자인 */
        .quick-grid::-webkit-scrollbar {
            width: 4px;
        }
        .quick-grid::-webkit-scrollbar-track {
            background: transparent;
        }
        .quick-grid::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 10px;
        }

        .quick-card {
            background-color: var(--quick-btn-bg);
            border: 1px solid transparent;
            border-radius: var(--border-radius-sm);
            padding: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: var(--transition-smooth);
            position: relative;
            min-height: 52px;
        }

        .quick-card:hover {
            background-color: var(--quick-btn-hover);
            transform: translateY(-1px);
            box-shadow: var(--shadow-sm);
        }

        .quick-card:active {
            transform: scale(0.98);
        }

        .quick-card-text {
            font-size: 14px;
            font-weight: 500;
            color: var(--quick-btn-text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: calc(100% - 24px);
            pointer-events: none;
        }

        .delete-card-btn {
            background: none;
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-muted);
            opacity: 0;
            transition: var(--transition-smooth);
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
        }

        /* 카드에 호버 시 또는 터치 인터페이스 고려 */
        .quick-card:hover .delete-card-btn,
        .quick-card:focus-within .delete-card-btn {
            opacity: 1;
        }

        .delete-card-btn:hover {
            background-color: var(--border-color);
            color: var(--danger);
        }

        .delete-card-btn svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        /* --- 모달 공통 스타일 (Glassmorphism) --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            padding: 20px;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-window {
            background-color: var(--bg-card);
            border-radius: var(--border-radius-lg);
            width: 100%;
            max-width: 400px;
            padding: 28px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-color);
            transform: translateY(20px);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .modal-overlay.active .modal-window {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .modal-close {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .form-group input {
            padding: 14px;
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-sm);
            background-color: var(--bg-input);
            color: var(--text-main);
            outline: none;
            font-size: 15px;
            transition: var(--transition-smooth);
        }

        .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        .form-helper {
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.4;
        }

        .modal-footer {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .modal-footer .btn {
            padding: 14px;
        }

        /* --- 회전 스피너 애니메이션 --- */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .spinner {
            animation: spin 1s linear infinite;
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
        }

        .btn-speak:disabled .spinner {
            border-top-color: var(--text-muted);
        }

        /* --- 유틸리티 알림 토스트 --- */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background-color: hsl(210, 15%, 20%);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: var(--shadow-lg);
            z-index: 1000;
            opacity: 0;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast-warning {
            background-color: var(--danger);
        }

        /* --- 카카오톡 전송 버튼 스타일 --- */
        .btn-kakao {
            background-color: #FEE500;
            color: #191919;
            flex: 1;
            box-shadow: 0 6px 16px rgba(254, 229, 0, 0.1);
        }

        .btn-kakao:hover:not(:disabled) {
            background-color: #FADA0A;
            transform: translateY(-1px);
        }

        .btn-kakao:active {
            transform: scale(0.98);
        }
    </style>
    <!-- 카카오톡 SDK 로드 -->
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"></script>
</head>
<body>

<div class="app-container">
    <!-- 헤더 -->
    <header>
        <div class="brand">
            <div class="brand-logo">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                    <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                </svg>
            </div>
            <h1>Dear<span>Voicer</span></h1>
        </div>
        <div class="header-actions">
            <!-- 테마 토글 버튼 -->
            <button id="theme-toggle-btn" class="icon-btn" title="화면 모드 변경" onclick="toggleTheme()">
                <!-- 해 (라이트모드) 아이콘 -->
                <svg id="sun-icon" viewBox="0 0 24 24" style="display:none;">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
                <!-- 달 (다크모드) 아이콘 -->
                <svg id="moon-icon" viewBox="0 0 24 24">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
            <!-- 설정 톱니바퀴 버튼 -->
            <button class="icon-btn" title="API 설정" onclick="openModal('settings-modal')">
                <svg viewBox="0 0 24 24">

<script>
    // --- 💬 카카오 SDK 초기화 ---

        if (typeof Kakao !== 'undefined' && !Kakao.isInitialized()) {
            Kakao.init('f17f7338e1cc20c32b7ca50c1c55da0c');

    // --- ⚙️ 상태 변수 정의 ---

    let currentEmotion = 'calm'; // 'friendly' | 'calm' | 'clear'

    // 감정 설정 상수
    const EMOTIONS = {

        calm: { stability: 0.65, similarity_boost: 0.75 },
        clear: { stability: 0.80, similarity_boost: 0.70 }

    // 자주 하는 말 기본 프리셋 데이터
    const DEFAULT_PHRASES = [
        { id: '1', emoji: '👋', text: '안녕하세요' },
        { id: '2', emoji: '☕', text: '휴식 타임' },

        { id: '5', emoji: '🏆', text: '최고 화이팅' },
        { id: '6', emoji: '👍', text: '잘하고 있어' },
        { id: '7', emoji: '🥳', text: '행복 폭발' },
        { id: '8', emoji: '💪', text: '함께 힘내자' }
    ];

    // 스마트 문장 추천용 사전 데이터
    const RECOMMEND_DB = [
        "안녕하세요",
        "반갑습니다",
        "감사합니다",
        "고맙습니다",
        "미안해 고마워",
        "죄송합니다",
        "도와주세요",
        "물 좀 주세요",
        "화장실이 어디예요?",
        "밥 먹을 시간이야",
        "식사하셨어요?",
        "배가 고파요",
        "목이 마릅니다",
        "잠깐만 기다려주세요",
        "네, 알겠습니다",
        "아니요, 괜찮습니다",
        "몸이 좀 아파요",
        "약 좀 가져다주세요",
        "문 좀 열어주세요",
        "불 좀 꺼주세요",
        "불 좀 켜주세요",
        "날씨가 덥네요",
        "날씨가 춥습니다",
        "조금 쉬고 싶어요",
        "사랑합니다",
        "고맙고 사랑해",
        "잘 자요, 좋은 꿈 꿔",
        "오늘 하루 고생했어",
        "어디 가고 싶으세요?",
        "천천히 말씀해주세요",
        "다시 한번 말해줄래?",
        "정말 고마워요",
        "좋은 아침입니다",
        "내일 또 만나요",
        "전화 좀 연결해 주세요",
        "밖에 나가고 싶어요",
        "미숙아 짜장면 먹자"
    ];

    // --- 🚀 앱 시작 시 초기화 ---
    window.addEventListener('DOMContentLoaded', () => {
        initTheme();
        initSettings();
        initPhrases();
        setSpeed(1.0);
        setEmotion('calm');
    });

    // --- 🌓 테마 관련 기능 (라이트/다크) ---
    function initTheme() {
        const savedTheme = localStorage.getItem('dearvoicer_theme');
        const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        
        if (savedTheme === 'dark' || (!savedTheme && systemPrefersDark)) {
            document.body.classList.add('dark');
            document.getElementById('sun-icon').style.display = 'block';
            document.getElementById('moon-icon').style.display = 'none';
        } else {
            document.body.classList.remove('dark');
            document.getElementById('sun-icon').style.display = 'none';
            document.getElementById('moon-icon').style.display = 'block';
        }
    }

    function toggleTheme() {
        const isDark = document.body.classList.toggle('dark');
        localStorage.setItem('dearvoicer_theme', isDark ? 'dark' : 'light');
        
        if (isDark) {
            document.getElementById('sun-icon').style.display = 'block';
            document.getElementById('moon-icon').style.display = 'none';
            showToast("🌙 다크 모드로 전환되었습니다.");
        } else {
            document.getElementById('sun-icon').style.display = 'none';
            document.getElementById('moon-icon').style.display = 'block';
            showToast("☀️ 라이트 모드로 전환되었습니다.");
        }
    }

    // --- ⚙️ ElevenLabs 설정 관리 ---
    function initSettings() {
        const apiKey = localStorage.getItem('dearvoicer_api_key') || '';
        const voiceId = localStorage.getItem('dearvoicer_voice_id') || '';
        
        document.getElementById('input-api-key').value = apiKey;
        document.getElementById('input-voice-id').value = voiceId;
    }

    function saveSettings() {
        const apiKey = document.getElementById('input-api-key').value.trim();
        const voiceId = document.getElementById('input-voice-id').value.trim();

        localStorage.setItem('dearvoicer_api_key', apiKey);
        localStorage.setItem('dearvoicer_voice_id', voiceId);

        closeModal('settings-modal');
        showToast("⚙️ 설정이 안전하게 저장되었습니다.");
    }

    function getAPIKey() {
        return localStorage.getItem('dearvoicer_api_key') || '';
    }

    function getVoiceID() {
        return localStorage.getItem('dearvoicer_voice_id') || '';
    }

    // --- 📁 자주 하는 말 관리 ---
    function initPhrases() {
        let phrases = localStorage.getItem('dearvoicer_quick_phrases');
        if (!phrases) {
            phrases = JSON.stringify(DEFAULT_PHRASES);
            localStorage.setItem('dearvoicer_quick_phrases', phrases);
        }
        renderPhrases();
    }

    function renderPhrases() {
        const grid = document.getElementById('quick-grid');
        grid.innerHTML = '';
        
        const phrases = JSON.parse(localStorage.getItem('dearvoicer_quick_phrases') || '[]');
        
        phrases.forEach(phrase => {
            const card = document.createElement('div');
            card.className = 'quick-card';
            card.onclick = () => quickSpeak(phrase.emoji, phrase.text);

            const textSpan = document.createElement('span');
            textSpan.className = 'quick-card-text';
            textSpan.innerText = phrase.emoji ? `${phrase.emoji} ${phrase.text}` : phrase.text;

            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'delete-card-btn';
            deleteBtn.title = '문구 삭제';
            deleteBtn.onclick = (e) => {
                e.stopPropagation();
                deletePhrase(phrase.id);
            };
            deleteBtn.innerHTML = `
                <svg viewBox="0 0 24 24">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            `;

            card.appendChild(textSpan);
            card.appendChild(deleteBtn);
            grid.appendChild(card);
        });
    }

    function addNewPhrase() {
        const emojiInput = document.getElementById('input-phrase-emoji').value.trim();
        const textInput = document.getElementById('input-phrase-text').value.trim();

        if (!textInput) {
            showToast("⚠️ 말할 내용을 입력해주세요.", true);
            return;
        }

        const phrases = JSON.parse(localStorage.getItem('dearvoicer_quick_phrases') || '[]');
        const newId = Date.now().toString();

        phrases.push({
            id: newId,
            emoji: emojiInput,
            text: textInput
        });

        localStorage.setItem('dearvoicer_quick_phrases', JSON.stringify(phrases));
        renderPhrases();
        
        document.getElementById('input-phrase-emoji').value = '';
        document.getElementById('input-phrase-text').value = '';
        closeModal('add-phrase-modal');
        showToast("✨ 새 문구가 추가되었습니다.");
    }

    function deletePhrase(id) {
        let phrases = JSON.parse(localStorage.getItem('dearvoicer_quick_phrases') || '[]');
        phrases = phrases.filter(p => p.id !== id);
        
        localStorage.setItem('dearvoicer_quick_phrases', JSON.stringify(phrases));
        renderPhrases();
        showToast("🗑️ 문구가 삭제되었습니다.");
    }

    // --- 🎚️ 속도 제어 기능 ---
    function setSpeed(val) {
        currentSpeed = parseFloat(val);
        document.getElementById('speed-slider').value = currentSpeed.toFixed(1);
        document.getElementById('speed-val').innerText = currentSpeed.toFixed(1) + 'x';
        
        if (currentAudio && appState === 'playing') {
            currentAudio.playbackRate = currentSpeed;
        }

        document.querySelectorAll('.preset-btn').forEach(btn => btn.classList.remove('active'));
        if (currentSpeed === 0.8) {
            document.getElementById('preset-slow').classList.add('active');
        } else if (currentSpeed === 1.0) {
            document.getElementById('preset-normal').classList.add('active');
        } else if (currentSpeed === 1.2) {
            document.getElementById('preset-fast').classList.add('active');
        }
    }

    function adjustSpeed(delta) {
        let newSpeed = currentSpeed + delta;
        newSpeed = Math.max(0.5, Math.min(2.0, newSpeed));
        setSpeed(newSpeed);
    }

    // --- 😊 감정 톤 제어 기능 ---
    function setEmotion(emotionKey) {
        currentEmotion = emotionKey;
        document.querySelectorAll('.emotion-chip').forEach(btn => btn.classList.remove('active'));
        
        if (emotionKey === 'friendly') {
            document.getElementById('emo-friendly').classList.add('active');
        } else if (emotionKey === 'calm') {
            document.getElementById('emo-calm').classList.add('active');
        } else if (emotionKey === 'clear') {
            document.getElementById('emo-clear').classList.add('active');
        }

        // 재생 중 감정을 변경하면 즉시 오디오 중지 및 상태 리셋
        if (appState === 'playing' || appState === 'loading') {
            stopAudio();
        }
    }

    // --- 📝 초성 추출 및 스마트 문장 추천 ---
    const HANGUL_CHOSUNG = [
        'ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'
    ];

    const CHOSUNG_LIST = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
    const JOONGSUNG_LIST = ['ㅏ','ㅐ','ㅑ','ㅒ','ㅓ','ㅔ','ㅕ','ㅖ','ㅗ','ㅘ','ㅙ','ㅚ','ㅛ','ㅜ','ㅝ','ㅞ','ㅟ','ㅠ','ㅡ','ㅢ','ㅣ'];
    const JONGSUNG_LIST = ['','ㄱ','ㄲ','ㄳ','ㄴ','ㄵ','ㄶ','ㄷ','ㄹ','ㄺ','ㄻ','ㄼ','ㄽ','ㄾ','ㄿ','ㅀ','ㅁ','ㅂ','ㅄ','ㅅ','ㅆ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];

    function isChosungOnly(str) {
        const cleanStr = str.replace(/\s/g, '');
        if (!cleanStr) return false;
        for (let i = 0; i < cleanStr.length; i++) {
            const code = cleanStr.charCodeAt(i);
            if (code < 12593 || code > 12622) {
                return false;
            }
        }
        return true;
    }

    function disassembleHangul(str) {
        let result = "";
        for (let i = 0; i < str.length; i++) {
            const code = str.charCodeAt(i);
            if (code >= 0xAC00 && code <= 0xD7A3) {
                const sIndex = code - 0xAC00;
                const cho = Math.floor(sIndex / 588);
                const jung = Math.floor((sIndex % 588) / 28);
                const jong = sIndex % 28;
                
                result += CHOSUNG_LIST[cho] + JOONGSUNG_LIST[jung];
                if (jong > 0) {
                    result += JONGSUNG_LIST[jong];
                }
            } else {
                result += str.charAt(i);
            }
        }
        return result;
    }

    function getChosung(str) {
        let result = "";
        for (let i = 0; i < str.length; i++) {
            const code = str.charCodeAt(i) - 44032;
            // 한글 유니코드 범위인 경우
            if (code >= 0 && code < 11172) {
                result += HANGUL_CHOSUNG[Math.floor(code / 588)];
            } else {
                result += str.charAt(i);
            }
        }
        return result;
    }

    function matchPhrase(phrase, query) {
        const phraseLower = phrase.toLowerCase();
        const queryLower = query.toLowerCase();

        // 1. 일반 문자열 포함 여부 검사
        if (phraseLower.includes(queryLower)) {
            return true;
        }

        // 2. 입력값이 초성으로만 이루어졌는지 검사
        if (isChosungOnly(queryLower)) {
            const phraseChosung = getChosung(phraseLower);
            const queryChosung = getChosung(queryLower);

            // 2-1. 공백 제거 후 초성이 시작 부분에 매칭되는지
            const cleanPhraseChosung = phraseChosung.replace(/\s+/g, '');
            const cleanQueryChosung = queryChosung.replace(/\s+/g, '');
            if (cleanPhraseChosung.startsWith(cleanQueryChosung)) {
                return true;
            }

            // 2-2. 어절 단위로 초성이 시작하는지 (예: 'ㅅ' 입력 시 '시간이야' 매칭)
            const words = phraseChosung.split(/\s+/);
            if (words.some(word => word.startsWith(queryChosung))) {
                return true;
            }
        } else {
            // 3. 자모 분해 매칭 (예: '미안ㅎ' -> '미안해' 매칭, '내'가 '안녕하세요'의 'ㄴ'에 매칭되지 않도록 방지)
            const disassembledPhrase = disassembleHangul(phraseLower);
            const disassembledQuery = disassembleHangul(queryLower);
            if (disassembledPhrase.includes(disassembledQuery)) {
                return true;
            }
        }

        return false;
    }

    function updateRecommendations(text) {
        const overlay = document.getElementById('recommend-overlay');
        const query = text.trim().toLowerCase();
        
        if (!query) {
            overlay.classList.remove('active');
            overlay.innerHTML = '';
            return;
        }

        // 검색 매칭
        const matches = RECOMMEND_DB.filter(phrase => matchPhrase(phrase, query)).slice(0, 3); // 최대 3개 매칭 노출

        if (matches.length > 0) {
            overlay.innerHTML = '';
            matches.forEach(match => {
                const chip = document.createElement('div');
                chip.className = 'recommend-chip';
                chip.innerText = match;
                chip.onclick = (e) => {
                    e.stopPropagation();
                    applyRecommendation(match);
                };
                overlay.appendChild(chip);
            });
            overlay.classList.add('active');
        } else {
            overlay.classList.remove('active');
            overlay.innerHTML = '';
        }
    }

    function applyRecommendation(text) {
        const input = document.getElementById('text-input');
        input.value = text;
        onTextChange();
        document.getElementById('recommend-overlay').classList.remove('active');
    }

    // --- 📝 입력 글자 수 세기 & 텍스트 제어 ---
    function onTextChange() {
        const text = document.getElementById('text-input').value;
        document.getElementById('char-count').innerText = text.length;
        updateRecommendations(text);
    }

    function clearText() {
        document.getElementById('text-input').value = '';
        onTextChange();
        stopAudio();
    }

    function quickSpeak(emoji, text) {
        document.getElementById('text-input').value = text;
        onTextChange();
        
        if (appState === 'playing' || appState === 'loading') {
            stopAudio();
        }
        
        generateVoice();
    }

    // --- 🔊 ElevenLabs API 연동 및 상태 머신 ---
    function handleSpeakClick() {
        if (appState === 'playing') {
            stopAudio();
        } else if (appState === 'idle') {
            generateVoice();
        }
    }

    function updateSpeakButtonState(state) {
        appState = state;
        const btn = document.getElementById('speak-btn');
        const iconSpan = document.getElementById('speak-btn-icon');
        const textSpan = document.getElementById('speak-btn-text');

        if (state === 'idle') {
            btn.className = 'btn btn-speak';
            btn.disabled = false;
            iconSpan.innerHTML = '📢';
            textSpan.innerText = '말하기';
        } else if (state === 'loading') {
            btn.className = 'btn btn-speak';
            btn.disabled = true;
            iconSpan.innerHTML = '<span class="spinner"></span>';
            textSpan.innerText = '생성 중...';
        } else if (state === 'playing') {
            btn.className = 'btn btn-speak playing';
            btn.disabled = false;
            iconSpan.innerHTML = '🛑';
            textSpan.innerText = '멈추기';
        }
    }

    async function generateVoice() {
        const text = document.getElementById('text-input').value.trim();
        const apiKey = getAPIKey();
        const voiceId = getVoiceID();

        if (!text) {
            showToast("⚠️ 말할 내용을 먼저 입력해 주세요.", true);
            return;
        }

        if (!apiKey || !voiceId) {
            showToast("⚙️ API Key와 Voice ID를 먼저 설정해 주세요.", true);
            openModal('settings-modal');
            return;
        }

        // API 전송 시 추천 레이어는 닫아줌
        document.getElementById('recommend-overlay').classList.remove('active');
        updateSpeakButtonState('loading');

        try {
            const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
                method: 'POST',
                headers: {
                    'accept': 'audio/mpeg',
                    'xi-api-key': apiKey,
                    'content-type': 'application/json'
                },
                body: JSON.stringify({
                    text: text,
                    model_id: "eleven_multilingual_v2",
                    voice_settings: {
                        stability: EMOTIONS[currentEmotion].stability,
                        similarity_boost: EMOTIONS[currentEmotion].similarity_boost
                    }
                })
            });

            if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                const detail = errorData.detail?.message || "요청에 실패했습니다.";
                throw new Error(detail);
            }

            const blob = await response.blob();
            const audioUrl = URL.createObjectURL(blob);
            
            stopAudio();

            currentAudio = new Audio(audioUrl);
            currentAudio.playbackRate = currentSpeed;
            
            currentAudio.addEventListener('play', () => {
                updateSpeakButtonState('playing');
            });

            currentAudio.addEventListener('ended', () => {
                cleanupAudio();
            });

            currentAudio.addEventListener('error', (e) => {
                console.error("Audio Playback Error:", e);
                showToast("⚠️ 음성 재생 중 오류가 발생했습니다.", true);
                cleanupAudio();
            });

            await currentAudio.play();

        } catch (error) {
            console.error(error);
            showToast("⚠️ 음성 생성 실패: " + error.message, true);
            updateSpeakButtonState('idle');
        }
    }

    function stopAudio() {
        if (currentAudio) {
            try {
                currentAudio.pause();
            } catch (e) {
                console.error(e);
            }
        }
        cleanupAudio();
    }

    function cleanupAudio() {
        currentAudio = null;
        updateSpeakButtonState('idle');
    }

    // --- 💬 모달 및 유틸리티 헬퍼 ---
    function openModal(id) {
        document.getElementById(id).classList.add('active');
    }

    function closeModal(id) {
        document.getElementById(id).classList.remove('active');
    }

    function closeModalOnOverlay(event, id) {
        if (event.target === document.getElementById(id)) {
            closeModal(id);
        }
    }

    // 도큐먼트 전체 클릭 감지하여 추천 창 외부 클릭 시 닫기
    document.addEventListener('click', (e) => {
        const overlay = document.getElementById('recommend-overlay');
        const input = document.getElementById('text-input');
        if (e.target !== overlay && e.target !== input) {
            overlay.classList.remove('active');
        }
    });

    // --- 💬 카카오톡 공유 기능 ---
    function shareKakaoTalk() {
        const text = document.getElementById('text-input').value.trim();
        if (!text) {
            showToast("⚠️ 전송할 내용을 먼저 입력해 주세요.", true);
            return;
        }

        if (typeof Kakao === 'undefined') {
            showToast("⚠️ 카카오 SDK가 로드되지 않았습니다.", true);
            return;
        }

        if (!Kakao.isInitialized()) {
            showToast("⚠️ API 설정이 필요합니다. 스크립트 상단의 'YOUR_JAVASCRIPT_KEY'를 입력해주세요.", true);
            return;
        }

        try {
            Kakao.Share.sendDefault({
                objectType: 'feed',
                content: {
                    title: '마음의 목소리 (DearVoicer)',
                    description: text,
                    imageUrl: 'https://images.unsplash.com/photo-1516280440614-37939bbacd6a?auto=format&fit=crop&q=80&w=400',
                    link: {
                        mobileWebUrl: window.location.href.startsWith('file:') ? 'https://developers.kakao.com' : window.location.href,
                        webUrl: window.location.href.startsWith('file:') ? 'https://developers.kakao.com' : window.location.href,
                    },
                },
                buttons: [
                    {
                        title: '앱 열기 / 자세히 보기',
                        link: {
                            mobileWebUrl: window.location.href.startsWith('file:') ? 'https://developers.kakao.com' : window.location.href,
                            webUrl: window.location.href.startsWith('file:') ? 'https://developers.kakao.com' : window.location.href,
                        },
                    },
                ],
                /* 
                   💡 오디오 파일 전송 주석 (생성된 오디오 공개 URL 첨부용)
                   만약 ElevenLabs API를 통해 생성된 mp3 파일을 공용 서버(S3 등)에 업로드하고 해당 URL을 얻을 수 있다면,
                   아래와 같이 'music' 템플릿 형태로 공유하거나 버튼 링크를 추가해 오디오를 바로 전송할 수 있습니다.
                   
                   예시:
                   objectType: 'music',
                   musicUrl: 'https://your-server.com/path/to/generated_audio.mp3', // 실제 오디오 파일 URL
                   content: {
                       title: '마음의 목소리 음성 메시지',
                       description: text,
                       imageUrl: '...',
                       link: { ... }
                   }
                */
            });
        } catch (error) {
            console.error("카카오 공유 전송 실패:", error);
            showToast("⚠️ 카카오톡 전송에 실패했습니다.", true);
        }
    }

    function showToast(message, isWarning = false) {
        const toast = document.getElementById('app-toast');
        toast.innerText = message;
        
        if (isWarning) {
            toast.classList.add('toast-warning');
        } else {
            toast.classList.remove('toast-warning');
        }

        toast.classList.add('show');
        
        setTimeout(() => {
            toast.classList.remove('show');
        }, 3000);
    }
</script>
